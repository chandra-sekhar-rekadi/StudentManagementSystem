spring:
  application:
    name: StudentManagementSystem

  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    username: system
    password: client
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.OracleDialect

server:
  port: 9090

  servlet:
    context-path: /StudentManagementSystem